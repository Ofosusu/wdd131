    <line x1="125" y1="15" x2="125" y2="0"/>
    <line x1="125" y1="140" x2="125" y2="155"/>
    <line x1="70" y1="70" x2="55" y2="70"/>
    <line x1="180" y1="70" x2="195" y2="70"/>
    <line x1="88" y1="33" x2="77" y2="22"/>
    <line x1="162" y1="107" x2="173" y2="118"/>
    <line x1="162" y1="33" x2="173" y2="22"/>
